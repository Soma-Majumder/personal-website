<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" role="img" aria-labelledby="impactTitle">
  <title id="impactTitle">Illustration of a corporate report document with a distinguished chapter award ribbon</title>
  <defs>
    <linearGradient id="impactBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F6E9D8"/>
      <stop offset="100%" stop-color="#EBCBA3"/>
    </linearGradient>
  </defs>
  <rect width="480" height="360" fill="url(#impactBg)"/>

  <!-- Back report page -->
  <rect x="150" y="55" width="150" height="215" rx="6" fill="#FFFFFF" opacity="0.7" transform="rotate(-5 225 162)"/>

  <!-- Front report page -->
  <g transform="rotate(3 200 170)">
    <rect x="120" y="60" width="160" height="220" rx="6" fill="#FFFFFF"/>
    <rect x="140" y="82" width="120" height="16" fill="#2B2622"/>
    <rect x="140" y="108" width="86" height="9" fill="#C1633D"/>
    <rect x="140" y="130" width="120" height="4" fill="#DCE7CE"/>
    <rect x="140" y="142" width="120" height="4" fill="#DCE7CE"/>
    <rect x="140" y="154" width="92" height="4" fill="#DCE7CE"/>
    <rect x="140" y="176" width="34" height="66" fill="#7C8A6E"/>
    <rect x="180" y="200" width="34" height="42" fill="#E4A853"/>
    <rect x="220" y="164" width="34" height="78" fill="#C1633D"/>
  </g>

  <!-- Award ribbon -->
  <g transform="translate(340 210)">
    <circle r="46" fill="#E4A853"/>
    <circle r="32" fill="#F6E9D8"/>
    <path d="M-14 -6 L-4 6 L18 -18" stroke="#C1633D" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M-28 38 L-12 16 L12 16 L28 38 L12 26 L-12 26 Z" fill="#A34E2E"/>
  </g>

  <!-- Sparkle accents -->
  <g fill="#7C8A6E" opacity="0.8">
    <circle cx="90" cy="90" r="4"/>
    <circle cx="380" cy="90" r="3"/>
    <circle cx="400" cy="300" r="3.5"/>
  </g>
</svg>
